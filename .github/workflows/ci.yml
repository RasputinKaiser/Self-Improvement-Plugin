name: SIPS CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install ".[dev]"

      - name: Compile scripts
        run: python -m compileall scripts

      - name: Verify Python floor
        run: |
          python -m pip install vermin
          python -m pip show vermin
          vermin --target=3.10- --no-tips scripts

      - name: Validate plugin manifest
        run: python scripts/validate_v2.py --check-eval

      - name: Run SIPS targeted suites
        run: |
          python scripts/run_tests.py memory_fabric --verbose
          python scripts/run_tests.py phase0_foundation --verbose
          python scripts/run_tests.py hook_contract --verbose
          python scripts/run_tests.py homebase_mcp --verbose

      - name: Run pytest suite
        run: pytest
